<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Tuition Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 380px; padding: 20px; }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      padding: 40px 36px; box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .brand { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -.02em; }
    .brand span { color: #818cf8; font-weight: 400; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: #94a3b8; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    input {
      width: 100%; padding: 10px 13px;
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; font-size: 14px; outline: none;
      margin-bottom: 18px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.2); }
    .hint { font-size: 11.5px; color: #475569; margin-top: -13px; margin-bottom: 18px; }
    .btn {
      width: 100%; padding: 11px;
      background: #4f46e5; border: none; border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #4338ca; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .error {
      background: #450a0a; border: 1px solid #991b1b; color: #fca5a5;
      border-radius: 8px; padding: 10px 13px; font-size: 13px;
      margin-top: 16px; display: none;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #475569; }
    .footer a { color: #818cf8; }
    .footer a:hover { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">Tuition<span>Manager</span></div>
      <div class="sub">Create your account</div>
      <form id="form" onsubmit="doSignup(event)">
        <label>Your Name</label>
        <input type="text" id="name" autocomplete="name" required autofocus placeholder="Ahmed Al-Rashidi">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
        <label>Password</label>
        <input type="password" id="password" autocomplete="new-password" required placeholder="••••••••">
        <div class="hint">Minimum 6 characters</div>
        <button type="submit" class="btn" id="submit-btn">Create account</button>
      </form>
      <div class="error" id="error-msg"></div>
    </div>
    <div class="footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    async function doSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true; btn.textContent = 'Creating account…'; err.style.display = 'none';

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     document.getElementById('name').value.trim(),
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const d = await res.json().catch(() => ({}));
        err.textContent = d.error || 'Something went wrong. Please try again.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create account';
      }
    }
  </script>
</body>
</html>
