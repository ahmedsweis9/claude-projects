<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Tuition Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 380px; padding: 20px; }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      padding: 40px 36px; box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .brand { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -.02em; }
    .brand span { color: #818cf8; font-weight: 400; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: #94a3b8; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    input {
      width: 100%; padding: 10px 13px;
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; font-size: 14px; outline: none;
      margin-bottom: 18px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.2); }
    .hint { font-size: 11.5px; color: #475569; margin-top: -13px; margin-bottom: 18px; }
    .btn {
      width: 100%; padding: 11px;
      background: #4f46e5; border: none; border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #4338ca; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .msg {
      border-radius: 8px; padding: 10px 13px; font-size: 13px;
      margin-top: 16px; display: none;
    }
    .msg.error   { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; }
    .msg.success { background: #052e16; border: 1px solid #166534; color: #86efac; }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #475569; }
    .footer a { color: #818cf8; }
    .invalid-token { text-align: center; color: #fca5a5; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">Tuition<span>Manager</span></div>
      <div class="sub" id="card-sub">Choose a new password</div>
      <div id="form-area">
        <form id="form" onsubmit="doSave(event)">
          <label>New Password</label>
          <input type="password" id="password" autocomplete="new-password" required autofocus placeholder="••••••••">
          <div class="hint">Minimum 6 characters</div>
          <label>Confirm Password</label>
          <input type="password" id="confirm" autocomplete="new-password" required placeholder="••••••••">
          <div class="hint" style="margin-bottom:18px"></div>
          <button type="submit" class="btn" id="submit-btn">Set new password</button>
        </form>
        <div class="msg" id="msg"></div>
      </div>
    </div>
    <div class="footer">
      <a href="/login.html">Back to sign in</a>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('form-area').innerHTML =
        '<div class="invalid-token">Invalid or missing reset token.<br><a href="/forgot-password.html" style="color:#818cf8">Request a new link</a></div>';
    }

    async function doSave(e) {
      e.preventDefault();
      const pw  = document.getElementById('password').value;
      const cfm = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submit-btn');

      msg.style.display = 'none'; msg.className = 'msg';

      if (pw !== cfm) {
        msg.className = 'msg error';
        msg.textContent = 'Passwords do not match.';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true; btn.textContent = 'Saving…';

      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw }),
      });

      const d = await res.json().catch(() => ({}));

      if (res.ok) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('card-sub').textContent = 'Password updated';
        msg.className = 'msg success';
        msg.textContent = 'Your password has been reset. Redirecting to sign in…';
        msg.style.display = 'block';
        setTimeout(() => { window.location.href = '/login.html'; }, 2500);
      } else {
        msg.className = 'msg error';
        msg.textContent = d.error || 'Something went wrong. Try requesting a new link.';
        msg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set new password';
      }
    }
  </script>
</body>
</html>
