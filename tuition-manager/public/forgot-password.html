<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password — Tuition Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 380px; padding: 20px; }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      padding: 40px 36px; box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .brand { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -.02em; }
    .brand span { color: #818cf8; font-weight: 400; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: #94a3b8; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    input {
      width: 100%; padding: 10px 13px;
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; font-size: 14px; outline: none;
      margin-bottom: 18px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.2); }
    .btn {
      width: 100%; padding: 11px;
      background: #4f46e5; border: none; border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #4338ca; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .msg {
      border-radius: 8px; padding: 12px 14px; font-size: 13px;
      margin-top: 16px; display: none; line-height: 1.5;
    }
    .msg.error   { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; }
    .msg.success { background: #052e16; border: 1px solid #166534; color: #86efac; }
    .reset-link {
      display: block; margin-top: 10px; word-break: break-all;
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      padding: 8px 10px; font-size: 12px; color: #818cf8;
      font-family: monospace;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #475569; }
    .footer a { color: #818cf8; }
    .footer a:hover { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">Tuition<span>Manager</span></div>
      <div class="sub">Reset your password</div>
      <form id="form" onsubmit="doReset(event)">
        <label>Email Address</label>
        <input type="email" id="email" autocomplete="email" required autofocus placeholder="you@example.com">
        <button type="submit" class="btn" id="submit-btn">Send reset link</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
    <div class="footer">
      <a href="/login.html">Back to sign in</a>
    </div>
  </div>

  <script>
    async function doReset(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('msg');
      btn.disabled = true; btn.textContent = 'Sending…';
      msg.style.display = 'none'; msg.className = 'msg';

      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });

      const d = await res.json().catch(() => ({}));
      btn.disabled = false; btn.textContent = 'Send reset link';

      if (!res.ok) {
        msg.className = 'msg error';
        msg.textContent = d.error || 'Something went wrong.';
        msg.style.display = 'block';
        return;
      }

      msg.className = 'msg success';

      if (d.method === 'email') {
        msg.textContent = 'A password reset link has been sent to your email. Check your inbox.';
      } else if (d.method === 'link') {
        msg.innerHTML = 'No email server is configured. Copy this link to reset your password (valid for 1 hour):';
        const a = document.createElement('a');
        a.href = d.reset_url;
        a.className = 'reset-link';
        a.textContent = d.reset_url;
        msg.appendChild(a);
      } else {
        msg.textContent = 'If that email is registered, you will receive reset instructions shortly.';
      }
      msg.style.display = 'block';
      document.getElementById('form').reset();
    }
  </script>
</body>
</html>
